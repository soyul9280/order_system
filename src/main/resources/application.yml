spring:
  datasource:
    url: jdbc:h2:tcp://localhost/~/orderminiSystem
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
